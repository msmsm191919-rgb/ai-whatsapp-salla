<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>واتساب - محاكاة</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Helvetica+Neue:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Helvetica Neue', sans-serif;
            background-color: #d1d7db;
        }

        .chat-bg {
            background-image: url('https://user-images.githubusercontent.com/15075759/28719144-86dc0f70-73b1-11e7-911d-60d70fcded21.png');
            background-repeat: repeat;
        }

        .message-in {
            background-color: #ffffff;
            border-radius: 0 10px 10px 10px;
        }

        .message-out {
            background-color: #d9fdd3;
            border-radius: 10px 0 10px 10px;
        }

        .chat-container {
            height: calc(100vh - 60px);
        }
    </style>
</head>

<body class="h-screen w-full flex justify-center">

    <div class="w-full max-w-md bg-white h-full flex flex-col shadow-2xl relative">
        <!-- Header -->
        <div class="bg-[#008069] p-3 flex items-center text-white shadow-md z-10">
            <a href="/dashboard" class="ml-2 hover:bg-white/10 p-2 rounded-full transition">
                <i class="fa-solid fa-arrow-right text-xl cursor-pointer"></i>
            </a>
            <div class="w-10 h-10 rounded-full bg-gray-300 overflow-hidden ml-3 border border-white/20">
                <img src="https://cdn-icons-png.flaticon.com/512/4712/4712109.png" class="w-full h-full object-cover">
            </div>
            <div class="flex-1">
                <h3 class="font-bold text-lg leading-tight">مبهر AI 🤖</h3>
                <p class="text-xs text-white/80">متصل الآن</p>
            </div>
            <div class="flex space-x-4 space-x-reverse text-xl">
                <i class="fa-solid fa-video"></i>
                <i class="fa-solid fa-phone"></i>
                <i class="fa-solid fa-ellipsis-vertical"></i>
            </div>
        </div>

        <!-- Chat Area -->
        <div class="flex-1 chat-bg overflow-y-auto p-4 space-y-3" id="chat-box">
            <!-- Intro Message -->
            <div class="flex justify-center mb-4">
                <div class="bg-[#e2f1fb] text-gray-600 text-xs px-3 py-1.5 rounded-lg shadow-sm text-center">
                    🔒 الرسائل مشفرة تماماً بين الطرفين.
                </div>
            </div>

            <div class="flex flex-col space-y-1 items-start message-in p-2 max-w-[80%] shadow-sm self-start">
                <span class="text-gray-800 text-sm leading-relaxed">أهلاً بك! 👋 أنا مساعدك الذكي. كيف أقدر أساعدك
                    اليوم؟</span>
                <span class="text-[10px] text-gray-500 self-end mt-1">10:00 ص</span>
            </div>
        </div>

        <!-- Input Area -->
        <div class="bg-[#f0f2f5] p-2 flex items-center space-x-2 space-x-reverse">
            <i class="fa-regular fa-face-smile text-gray-500 text-2xl mx-1 cursor-pointer"></i>
            <i class="fa-solid fa-plus text-gray-500 text-2xl mx-1 cursor-pointer"></i>
            <input type="text" id="msg-input" placeholder="اكتب رسالة"
                class="flex-1 bg-white rounded-lg py-2 px-4 focus:outline-none border-none text-sm h-10">
            <div id="send-btn"
                class="w-10 h-10 bg-[#008069] rounded-full flex items-center justify-center text-white cursor-pointer hover:bg-[#006d59] transition shadow-sm">
                <i class="fa-solid fa-paper-plane text-sm"></i>
            </div>
        </div>
    </div>

    <!-- Logic -->
    <script src="/socket.io/socket.io.js"></script>
    <script>
        const socket = io();
        const chatBox = document.getElementById('chat-box');
        const input = document.getElementById('msg-input');
        const sendBtn = document.getElementById('send-btn');

        // Play Sound
        const playSent = () => new Audio('https://assets.mixkit.co/active_storage/sfx/2354/2354-preview.mp3').play().catch(() => { });
        const playRecv = () => new Audio('https://assets.mixkit.co/active_storage/sfx/2358/2358-preview.mp3').play().catch(() => { });

        function appendMessage(text, type) {
            const time = new Date().toLocaleTimeString('ar-SA', { hour: '2-digit', minute: '2-digit' });
            const div = document.createElement('div');

            if (type === 'out') {
                div.className = "flex flex-col space-y-1 items-start message-out p-2 max-w-[80%] shadow-sm self-end";
                div.innerHTML = `
                    <span class="text-gray-800 text-sm leading-relaxed">${text}</span>
                    <div class="flex items-center self-end mt-1 space-x-1 space-x-reverse">
                        <span class="text-[10px] text-gray-500">${time}</span>
                        <i class="fa-solid fa-check-double text-blue-500 text-[10px]"></i>
                    </div>
                `;
            } else {
                div.className = "flex flex-col space-y-1 items-start message-in p-2 max-w-[80%] shadow-sm self-start";
                div.innerHTML = `
                    <span class="text-gray-800 text-sm leading-relaxed">${text}</span>
                    <span class="text-[10px] text-gray-500 self-end mt-1">${time}</span>
                `;
            }

            chatBox.appendChild(div);
            chatBox.scrollTop = chatBox.scrollHeight;
        }

        async function sendMessage() {
            const text = input.value.trim();
            if (!text) return;

            appendMessage(text, 'out');
            playSent();
            input.value = '';

            // Send to Server via API
            try {
                const res = await fetch('/api/simulator/send', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        message: text,
                        phone: '966501234567' // Simulated User Phone
                    })
                });

                const data = await res.json();

                if (data.reply) {
                    setTimeout(() => {
                        appendMessage(data.reply, 'in');
                        playRecv();
                    }, 1000); // Realistic Typing Delay
                } else if (data.error) {
                    appendMessage("⚠️ خطأ في النظام: " + data.error, 'in');
                }

            } catch (e) {
                console.error(e);
                appendMessage("❌ فشل الاتصال بالسيرفر", 'in');
            }
        }

        sendBtn.onclick = sendMessage;
        input.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') sendMessage();
        });
        // Remove socket listener as we use req/res now

    </script>
</body>

</html>
