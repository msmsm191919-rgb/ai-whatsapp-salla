<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لوحة الإدارة - مبهر AI</title>
    <!-- Tailwind & Fonts -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body {
            font-family: 'Tajawal', sans-serif;
        }

        .admin-sidebar-link {
            display: flex;
            align-items: center;
            padding: 0.75rem 1rem;
            color: #9ca3af;
            /* gray-400 */
            border-radius: 0.5rem;
            transition: all 0.2s;
        }

        .admin-sidebar-link:hover,
        .admin-sidebar-link.active {
            background-color: #1f2937;
            /* gray-800 */
            color: #fff;
        }

        .admin-sidebar-link i {
            width: 1.5rem;
        }

        /* Global Custom Scrollbar */
        ::-webkit-scrollbar {
            width: 10px;
        }

        ::-webkit-scrollbar-track {
            background: #f1f1f1;
        }

        ::-webkit-scrollbar-thumb {
            background: #cbd5e1;
            border-radius: 5px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: #94a3b8;
        }
    </style>
</head>

<body class="bg-gray-100 min-h-screen flex text-sm">

    <!-- 1.2 Sidebar -->
    <aside class="w-64 bg-gray-900 text-white flex-shrink-0 flex flex-col items-center py-6 fixed h-full z-20">
        <!-- Logo -->
        <div class="px-6 w-full mb-8 flex items-center gap-2">
            <div class="w-8 h-8 bg-red-600 rounded-lg flex items-center justify-center text-white font-bold">A</div>
            <h1 class="text-lg font-bold">مبهر <span class="text-teal-400">Admin</span></h1>
        </div>

        <!-- Navigation -->
        <nav class="flex-1 w-full px-4 space-y-1 overflow-y-auto">
            <a href="/admin" class="admin-sidebar-link {% if page == 'overview' %}active{% endif %}">
                <i class="fa-solid fa-gauge-high"></i> لوحة التحكم
            </a>
            <a href="/admin/tenants" class="admin-sidebar-link {% if page == 'tenants' %}active{% endif %}">
                <i class="fa-solid fa-store"></i> المتاجر
            </a>
            <a href="/admin/subscriptions" class="admin-sidebar-link {% if page == 'subscriptions' %}active{% endif %}">
                <i class="fa-solid fa-file-invoice-dollar"></i> الاشتراكات
            </a>
            <a href="/admin/billing" class="admin-sidebar-link {% if page == 'billing' %}active{% endif %}">
                <i class="fa-solid fa-money-bill-wave"></i> الفوترة والمدفوعات
            </a>
            <div class="border-t border-gray-700 my-2 mx-2"></div>
            <a href="/admin/usage" class="admin-sidebar-link {% if page == 'usage' %}active{% endif %}">
                <i class="fa-solid fa-chart-pie"></i> الرسائل والاستهلاك
            </a>
            <a href="/admin/reports" class="admin-sidebar-link {% if page == 'reports' %}active{% endif %}">
                <i class="fa-solid fa-file-lines"></i> التقارير
            </a>
            <a href="/admin/logs" class="admin-sidebar-link {% if page == 'logs' %}active{% endif %}">
                <i class="fa-solid fa-bug"></i> السجلات والأخطاء
            </a>
            <div class="border-t border-gray-700 my-2 mx-2"></div>
            <a href="/admin/plans" class="admin-sidebar-link {% if page == 'plans' %}active{% endif %}">
                <i class="fa-solid fa-layer-group"></i> الباقات
            </a>
            <a href="/admin/settings" class="admin-sidebar-link {% if page == 'settings' %}active{% endif %}">
                <i class="fa-solid fa-gear"></i> الإعدادات
            </a>
            <a href="/admin/support" class="admin-sidebar-link {% if page == 'support' %}active{% endif %}">
                <i class="fa-solid fa-headset"></i> الدعم والتذاكر
            </a>
        </nav>

        <!-- User Profile -->
        <div class="w-full px-4 mt-4">
            <div class="bg-gray-800 rounded-lg p-3 flex items-center gap-3">
                <div class="w-8 h-8 rounded-full bg-gray-600 flex items-center justify-center">
                    <i class="fa-solid fa-user-shield text-xs"></i>
                </div>
                <div class="flex-1 overflow-hidden">
                    <p class="text-xs font-bold truncate">Super Admin</p>
                    <p class="text-[10px] text-gray-400">admin@mobhir.ai</p>
                </div>
                <a href="/logout" class="text-gray-400 hover:text-white"><i
                        class="fa-solid fa-right-from-bracket"></i></a>
            </div>
        </div>
    </aside>

    <!-- Content Wrapper -->
    <div class="flex-1 flex flex-col mr-64 w-full">
        <!-- 1.1 Top Bar -->
        <header
            class="h-16 bg-white border-b border-gray-200 flex items-center justify-between px-8 sticky top-0 z-10 shadow-sm">
            <!-- Search -->
            <div class="flex-1 max-w-lg relative">
                <i class="fa-solid fa-magnifying-glass absolute right-3 top-3 text-gray-400"></i>
                <input type="text" placeholder="ابحث عن متجر، رقم، أو Merchant ID..."
                    class="w-full bg-gray-50 border border-gray-200 rounded-lg pr-10 pl-4 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-teal-500 transition">
            </div>

            <!-- Right Actions -->
            <div class="flex items-center gap-4 mr-4">
                <button class="relative p-2 text-gray-400 hover:text-gray-600 transition">
                    <span class="absolute top-1 right-1 w-2 h-2 bg-red-500 rounded-full border border-white"></span>
                    <i class="fa-regular fa-bell text-lg"></i>
                </button>
                <div class="h-8 w-px bg-gray-200"></div>
                <span class="text-xs font-bold text-gray-500">{{ now_date }}</span>
            </div>
        </header>

        <!-- Dynamic Content -->
        <main class="p-8">
            {% block content %}{% endblock %}
        </main>
    </div>

</body>

</html>
