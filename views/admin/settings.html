{% extends 'admin/layout.html' %}

{% block content %}
<div class="space-y-5 max-w-2xl">

    <!-- Header -->
    <div style="background:#fff;border:1px solid #e2e8f0;border-radius:16px;padding:20px 24px;" class="flex items-center justify-between flex-wrap gap-3">
        <div>
            <h2 class="font-black text-slate-800" style="font-size:18px;">إعدادات المنصة</h2>
            <p class="text-xs mt-1" style="color:#94a3b8;">الإعدادات العامة لنظام مبهر</p>
        </div>
        <span id="setStatus" class="text-xs font-bold"></span>
    </div>

    <!-- Settings Form -->
    <div style="background:#fff;border:1px solid #e2e8f0;border-radius:16px;padding:24px;">
        <div style="display:flex;flex-direction:column;gap:20px;">
            <div>
                <label style="display:block;font-size:12px;font-weight:700;color:#374151;margin-bottom:6px;">اسم النظام</label>
                <input id="system_name" type="text" value="{{ settings.system_name }}"
                    style="width:100%;border:1.5px solid #e2e8f0;border-radius:10px;padding:10px 14px;font-size:13px;outline:none;font-family:Cairo,sans-serif;background:#f8fafc;">
            </div>
            <div>
                <label style="display:block;font-size:12px;font-weight:700;color:#374151;margin-bottom:6px;">بريد الدعم الفني</label>
                <input id="support_email" type="email" value="{{ settings.support_email }}" dir="ltr"
                    style="width:100%;border:1.5px solid #e2e8f0;border-radius:10px;padding:10px 14px;font-size:13px;outline:none;font-family:Inter,monospace;background:#f8fafc;text-align:right;">
            </div>
            <div>
                <label style="display:flex;align-items:center;justify-content:space-between;padding:12px 16px;border:1.5px solid #e2e8f0;border-radius:12px;cursor:pointer;background:#f8fafc;">
                    <span style="font-size:13px;font-weight:600;color:#374151;">وضع الصيانة (Maintenance Mode)</span>
                    <input id="maintenance" type="checkbox" {{ 'checked' if settings.maintenance }} style="width:18px;height:18px;cursor:pointer;accent-color:#0d9488;">
                </label>
            </div>
            <div>
                <label style="display:block;font-size:12px;font-weight:700;color:#374151;margin-bottom:6px;">نص التذييل (Footer)</label>
                <textarea id="footer" rows="2"
                    style="width:100%;border:1.5px solid #e2e8f0;border-radius:10px;padding:10px 14px;font-size:13px;outline:none;font-family:Cairo,sans-serif;background:#f8fafc;resize:vertical;line-height:1.6;">{{ settings.footer }}</textarea>
            </div>
            <div class="flex justify-end pt-2" style="border-top:1px solid #f1f5f9;">
                <button id="saveSettingsBtn" onclick="saveSettings()" style="background:linear-gradient(135deg,#0d9488,#0ea5e9);color:#fff;border:none;border-radius:10px;padding:10px 24px;font-size:13px;font-weight:700;cursor:pointer;display:flex;align-items:center;gap:8px;font-family:Cairo,sans-serif;">
                    <i class="fa-solid fa-floppy-disk"></i> حفظ التغييرات
                </button>
            </div>
        </div>
    </div>

    <p class="text-xs text-center" style="color:#cbd5e1;">⚙️ ربط Meta API / سلة / SMTP يُدار من ملف <code>.env</code> على الخادم.</p>

</div>

<script>
    async function saveSettings() {
        const btn = document.getElementById('saveSettingsBtn');
        const status = document.getElementById('setStatus');
        const orig = btn.innerHTML; btn.disabled = true; btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> جاري الحفظ...';
        try {
            const r = await fetch('/admin/settings/save', {
                method: 'POST', headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    system_name: document.getElementById('system_name').value,
                    support_email: document.getElementById('support_email').value,
                    maintenance: document.getElementById('maintenance').checked,
                    footer: document.getElementById('footer').value
                })
            });
            const d = await r.json();
            status.textContent = d.ok ? '✅ تم الحفظ' : ('❌ ' + (d.error || 'فشل'));
            status.style.color = d.ok ? '#16a34a' : '#dc2626';
        } catch (e) { status.textContent = '❌ ' + e.message; status.style.color = '#dc2626'; }
        btn.disabled = false; btn.innerHTML = orig;
        setTimeout(() => { status.textContent = ''; }, 4000);
    }
</script>
{% endblock %}
