name: Production Auto Deploy Pipeline

on:
  push:
    branches:
      - main

jobs:
  deploy:
    name: Deploy to Production VPS
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: 'npm'

      - name: Validate Code Syntax
        run: node -c app.js routes/*.js services/*.js 2>/dev/null || true

      - name: Deploy via SSH Key
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: 22
          script: |
            cd /var/www/mobher-ai || cd ~/ai-whatsapp-salla
            test -f app.js
            git fetch --all
            git reset --hard origin/main
            npm install --omit=dev
            pm2 startOrGracefulReload ecosystem.config.js --update-env || pm2 restart whatsapp-ai --update-env
            pm2 status
