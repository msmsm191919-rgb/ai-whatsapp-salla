version: '3.8'

services:
  app:
    build: .
    container_name: salla_ai_app
    restart: always
    ports:
      - "8095:8095"
    environment:
      - NODE_ENV=production
      - PORT=8095
      # Database Config (Update these on Server!)
      - DATABASE_SERVER=mysql_db
      - DATABASE_USERNAME=salla_user
      - DATABASE_PASSWORD=secure_password_here
      - DATABASE_NAME=salla_whatsapp_db
      - SALLA_DATABASE_DIALECT=mysql
      # App Secrets (Update these on Server!)
      - SALLA_OAUTH_CLIENT_ID=your_client_id
      - SALLA_OAUTH_CLIENT_SECRET=your_client_secret
      - SALLA_WEBHOOK_SECRET=your_webhook_secret
    depends_on:
      - mysql_db
    networks:
      - app_network

  mysql_db:
    image: mysql:8.0
    container_name: salla_mysql_db
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root_secure_password
      MYSQL_DATABASE: salla_whatsapp_db
      MYSQL_USER: salla_user
      MYSQL_PASSWORD: secure_password_here
    volumes:
      - db_data:/var/lib/mysql
    networks:
      - app_network

networks:
  app_network:
    driver: bridge

volumes:
  db_data:
